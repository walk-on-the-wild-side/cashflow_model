# WATERFALL RULES
# Source: Distributions of Principal, Page 10

waterfall_rules:
  group1:
    # Step 1: The BZ Accrual Amount to BV until retired, and thereafter to BZ.
    - step: 1
      description: "The BZ Accrual Amount to BV until retired, and thereafter to BZ."
      source: "accrual"
      accrual_class: "BZ"
      targets:
        - class_id: "BV"
          mode: "sequential"
          priority: 1
        - class_id: "BZ"
          mode: "sequential"
          priority: 2
    # Step 2a: 50% of Group 1 CF to sequential classes
    - step: 2
      description: "50% of Group 1 CF to BA->BE->BV->BZ sequentially"
      source: "collateral_cf"
      split_pct: 0.50
      targets:
        - class_id: "BA"
          mode: "sequential"
          priority: 1
        - class_id: "BE"
          mode: "sequential"
          priority: 2
        - class_id: "BV"
          mode: "sequential"
          priority: 3
        - class_id: "BZ"
          mode: "sequential"
          priority: 4
    # Step 2b: 50% to FB
    - step: 3
      description: "50% of Group 1 CF to FB"
      source: "collateral_cf"
      split_pct: 0.50
      targets:
        - class_id: "FB"
          mode: "sequential"
          priority: 1

  group2:
    # Step 1: The CZ Accrual Amount to CA until retired, and thereafter to CZ.
    - step: 1
      description: "The CZ Accrual Amount to CA until retired, and thereafter to CZ."
      source: "accrual"
      accrual_class: "CZ"
      targets:
        - class_id: "CA"
          mode: "sequential"
          priority: 1
        - class_id: "CZ"
          mode: "sequential"
          priority: 2
    # Step 2a: 50% of Group 2 CF sequentially
    - step: 2
      description: "50% of Group 2 CF to CA->CZ sequentially"
      source: "collateral_cf"
      split_pct: 0.50
      targets:
        - class_id: "CA"
          mode: "sequential"
          priority: 1
        - class_id: "CZ"
          mode: "sequential"
          priority: 2
    # Step 2b: 50% to FC
    - step: 3
      description: "50% of Group 2 CF to FC"
      source: "collateral_cf"
      split_pct: 0.50
      targets:
        - class_id: "FC"
          mode: "sequential"
          priority: 1

